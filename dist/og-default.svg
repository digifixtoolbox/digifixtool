<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Top accent bar -->
  <rect width="1200" height="6" fill="#0071e3"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#f0f0f5" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Center card -->
  <rect x="200" y="140" width="800" height="350" rx="32" fill="#f5f5f7"/>

  <!-- Logo icon circle -->
  <circle cx="600" cy="255" r="52" fill="#0071e3"/>
  <text x="600" y="274" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" text-anchor="middle" fill="#ffffff">⚡</text>

  <!-- Brand name -->
  <text x="600" y="355" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800" text-anchor="middle" fill="#1d1d1f" letter-spacing="-2">PixMidas</text>

  <!-- Tagline -->
  <text x="600" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" text-anchor="middle" fill="#6e6e73">Free browser tools. No login. No uploads.</text>

  <!-- Bottom URL -->
  <text x="600" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500" text-anchor="middle" fill="#86868b">pixmidas.com</text>
</svg>
